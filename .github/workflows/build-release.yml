name: Build Release Installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload assets to, for example v1.2.3.
        required: true

permissions:
  contents: write

concurrency:
  group: build-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04

    steps:
      - name: Validate release tag
        run: |
          TAG="${{ inputs.tag }}"
          SEMVER_TAG_REGEX='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$TAG" =~ $SEMVER_TAG_REGEX ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi

  linux:
    name: Linux deb/rpm/AppImage
    runs-on: ubuntu-24.04
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libfuse2t64 \
            patchelf \
            rpm

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux bundles
        run: bun run tauri -- build --bundles deb,rpm,appimage

      - name: Upload Linux installers
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  windows:
    name: Windows exe
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows installer
        run: bun run tauri -- build --bundles nsis

      - name: Upload Windows installer
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ inputs.tag }}
          files: src-tauri/target/release/bundle/nsis/*.exe

  macos:
    name: macOS dmg/pkg (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
          - os: macos-15
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS app and dmg
        run: bun run tauri -- build --bundles app,dmg

      - name: Build macOS pkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/build-macos-pkg.mjs --release --skip-app-build --version "$VERSION" --arch "${{ matrix.arch }}"

      - name: Upload macOS installers
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
