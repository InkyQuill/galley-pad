name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

concurrency:
  group: semantic-release
  cancel-in-progress: false

jobs:
  release:
    name: Version and publish release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install dependencies
        run: npm ci

      - name: Run frontend and script tests
        run: npm test

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: npm run build

      - name: Create semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          trap 'git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"' EXIT
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          npx semantic-release

      - name: Build release installers
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TAG="${{ steps.semantic.outputs.tag }}"
          gh workflow run build-release.yml --ref main -f tag="$TAG"

          RUN_ID=""
          for _ in {1..30}; do
            RUN_ID="$(gh run list \
              --workflow build-release.yml \
              --branch main \
              --event workflow_dispatch \
              --created ">=$STARTED_AT" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "Timed out waiting for build-release.yml dispatch for $TAG." >&2
            exit 1
          fi

          gh run watch "$RUN_ID" --exit-status --interval 30
