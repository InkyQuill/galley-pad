name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

concurrency:
  group: semantic-release
  cancel-in-progress: false

jobs:
  release:
    name: Version and publish release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend and script tests
        run: bun run test

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: bun run build

      - name: Create semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          trap 'git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"' EXIT
          git config --unset core.hooksPath || true
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          bunx semantic-release

      - name: Build release installers
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TAG="${{ steps.semantic.outputs.tag }}"
          gh workflow run build-release.yml --ref main -f tag="$TAG"

          RUN_ID=""
          for _ in {1..30}; do
            RUN_ID="$(gh run list \
              --workflow build-release.yml \
              --branch main \
              --event workflow_dispatch \
              --created ">=$STARTED_AT" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "Timed out waiting for build-release.yml dispatch for $TAG." >&2
            exit 1
          fi

          gh run watch "$RUN_ID" --exit-status --interval 30

      - name: Publish AUR package
        if: steps.semantic.outputs.released == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_SSH_KNOWN_HOSTS: ${{ vars.AUR_SSH_KNOWN_HOSTS }}
        run: |
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not configured; skipping AUR publish."
            exit 0
          fi

          TAG="${{ steps.semantic.outputs.tag }}"
          VERSION="${TAG#v}"
          AUR_REPO="ssh://aur@aur.archlinux.org/galley-pad-bin.git"
          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "$WORK_DIR"' EXIT

          node scripts/update-aur-package.mjs "$VERSION"

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          if [ -n "${AUR_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$AUR_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan aur.archlinux.org > "$HOME/.ssh/known_hosts"
          fi

          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          if ! git clone "$AUR_REPO" "$WORK_DIR/aur"; then
            mkdir -p "$WORK_DIR/aur"
            cd "$WORK_DIR/aur"
            git init
            git remote add origin "$AUR_REPO"
          fi
          cp packaging/aur/galley-pad-bin/PKGBUILD packaging/aur/galley-pad-bin/.SRCINFO "$WORK_DIR/aur/"

          cd "$WORK_DIR/aur"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi
          git commit -m "Update to ${VERSION}"
          git push origin HEAD:master
